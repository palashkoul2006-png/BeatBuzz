<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Beatbuzz | Posts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="explore.css"/>
  <link rel="icon" type="image/png" href="Beatbuzz_icon.png">
  <style>
    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      margin-bottom: 30px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .glass-panel:hover {
      box-shadow: 0 12px 40px 0 rgba(91, 33, 182, 0.2);
    }
    
    .futuristic-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .file-upload-wrapper {
      position: relative;
      width: 100%;
    }
    .file-input-hidden {
      width: 0.1px;
      height: 0.1px;
      opacity: 0;
      overflow: hidden;
      position: absolute;
      z-index: -1;
    }
    .file-upload-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, rgba(91,33,182,0.05) 0%, rgba(37,99,235,0.05) 100%);
      border: 2px dashed rgba(91, 33, 182, 0.4);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #5b21b6;
    }
    [data-theme="dark"] .file-upload-label {
      color: #a78bfa;
      border-color: rgba(167, 139, 250, 0.4);
    }
    .file-upload-label:hover {
      background: linear-gradient(135deg, rgba(91,33,182,0.1) 0%, rgba(37,99,235,0.1) 100%);
      border-color: #5b21b6;
      transform: translateY(-2px);
    }
    [data-theme="dark"] .file-upload-label:hover {
      border-color: #a78bfa;
    }
    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #5b21b6 0%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: transform 0.3s ease;
    }
    [data-theme="dark"] .upload-icon {
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .file-upload-label:hover .upload-icon {
      transform: scale(1.1);
    }
    .upload-text {
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
    }

    .glass-image-preview {
      display: none;
      max-width: 100%;
      max-height: 400px;
      margin: 20px auto 0;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .input-glow-wrapper {
      position: relative;
    }
    .input-glow-wrapper::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(90deg, #5b21b6, #2563eb, #5b21b6);
      background-size: 200% auto;
      border-radius: 14px;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
      animation: shine 3s linear infinite;
    }
    .input-glow-wrapper:focus-within::after {
      opacity: 1;
    }
    @keyframes shine {
      to { background-position: 200% center; }
    }
    
    .futuristic-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 1.05rem;
      color: #333;
      resize: vertical;
      min-height: 60px;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    [data-theme="dark"] .futuristic-input {
      background: rgba(30, 30, 40, 0.8);
      border-color: rgba(255,255,255,0.1);
      color: #fff;
    }
    .futuristic-input:focus {
      outline: none;
      background: #fff;
    }
    [data-theme="dark"] .futuristic-input:focus {
      background: #1e1e28;
    }
    .futuristic-input::placeholder {
      color: #888;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
    }
    .futuristic-btn {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      background-size: 200% auto;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 32px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .futuristic-btn:hover {
      background-position: right center;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.6);
    }
    .futuristic-btn:active {
      transform: translateY(1px);
    }
    
    .file-name-display {
      text-align: center;
      margin-top: 10px;
      font-size: 0.9rem;
      color: #5b21b6;
      font-weight: 600;
    }
    [data-theme="dark"] .file-name-display {
      color: #a78bfa;
    }
    
    .feed-tabs {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }
    .feed-tab {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      background: rgba(128,128,128,0.1);
      color: #555;
      transition: all 0.3s ease;
    }
    [data-theme="dark"] .feed-tab {
      color: #bbb;
      background: rgba(255,255,255,0.05);
    }
    .feed-tab.active {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
    }
    .feed-tab:hover:not(.active) {
      background: rgba(128,128,128,0.2);
    }
    [data-theme="dark"] .feed-tab:hover:not(.active) {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body class="page-enter">
  <div class="main-layout">
    <nav class="sidebar">
      <a href="explore.html"><i class="bi bi-compass"></i><span class="label">Explore</span></a>
      <a href="search.html"><i class="bi bi-search"></i><span class="label">Search</span></a>
      <a href="notification.html"><i class="bi bi-bell"></i><span class="label">Notifications</span></a>
      <a href="posts.html" class="active"><i class="bi bi-images"></i><span class="label">Posts</span></a>
      <a href="chat.html"><i class="bi bi-chat-dots"></i><span class="label">Chat</span></a>
      <a href="profile.html"><i class="bi bi-person"></i><span class="label">Profile</span></a>
      <a href="http://localhost:5000/logout"><i class="bi bi-box-arrow-right"></i><span class="label">Logout</span></a>
    </nav>

    <main class="center-feed">
      <h2 id="feedTitle" class="explore-title">Community Posts</h2>

      <section class="upload-section glass-panel">
        <form id="postForm" class="futuristic-form">
          <div class="file-upload-wrapper">
            <input type="file" id="postImage" name="image" accept="image/*" class="file-input-hidden" />
            <label for="postImage" class="file-upload-label">
              <i class="bi bi-cloud-arrow-up-fill upload-icon"></i>
              <span class="upload-text">Drop an image or click to browse</span>
            </label>
            <div id="file-name-display" class="file-name-display"></div>
            <img id="postImagePreview" src="" alt="Image Preview" class="glass-image-preview" />
          </div>
          
          <div class="input-glow-wrapper">
            <textarea id="postCaption" name="caption" class="futuristic-input" placeholder="Share a thought, a vibe, or a story..." rows="2"></textarea>
          </div>
          
          <div class="form-actions">
            <button type="submit" class="futuristic-btn"><i class="bi bi-rocket-takeoff-fill"></i> Launch Post</button>
          </div>
        </form>
      </section>

      <div class="feed-type-tabs" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="tabCommunity" class="feed-tab active"><i class="bi bi-globe"></i> Community</button>
        <button id="tabMyPosts" class="feed-tab"><i class="bi bi-person-lines-fill"></i> My Posts</button>
      </div>

      <div class="feed-tabs">
        <button id="tabVisuals" class="feed-tab active"><i class="bi bi-images"></i> Visual Posts</button>
        <button id="tabThoughts" class="feed-tab"><i class="bi bi-chat-text"></i> Thoughts</button>
      </div>

      <div id="visualPostsContainer" class="profile-cards">
        <!-- Visual Posts will render here -->
      </div>
      
      <div id="textPostsContainer" class="profile-cards" style="display: none;">
        <!-- Text Posts will render here -->
      </div>
    </main>

    <aside class="profile-panel">
      <img src="/uploads/default.jpg" 
           alt="Your Profile Picture" 
           class="your-pic" 
           style="border-radius:50%; width:90px; height:90px; border: 2px solid #5b21b6; margin-bottom:1rem;" />
      <div class="your-name">Your Name</div>
      <div class="your-zodiac">♒ Aquarius</div>
      <div class="your-bio">Share your vibe with an image and caption.</div>
    </aside>
  </div>

  <!-- Image Viewer Modal -->
  <div id="imageModal" class="image-modal" style="display: none;">
    <div class="image-modal-content">
      <span class="image-modal-close">&times;</span>
      <img id="modalImage" class="modal-image" src="" alt="Full size image">
      <div class="image-modal-caption"></div>
    </div>
  </div>
  
<div id="likesModal" class="image-modal" style="display: none; z-index: 2000; align-items: center; justify-content: center;">
    <div class="image-modal-content" style="background: white; max-width: 400px; width: 90%; padding: 20px; border-radius: 16px; position: relative; display: flex; flex-direction: column; align-items: stretch;">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; width: 100%;">
        <h5 style="margin: 0; color: #111; font-weight: 700;">Liked by</h5>
        <span class="likes-modal-close" style="cursor: pointer; font-size: 1.8rem; line-height: 1; color: #555;">&times;</span>
      </div>
      <div id="likesList" style="max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; width: 100%;">
        </div>
    </div>
  </div>

  <script src="../theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="posts.js"></script>
</body>
</html>
