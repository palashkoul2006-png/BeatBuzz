<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Beatbuzz | Search</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="explore.css"/> <!-- reuse explore.css for theme -->
  <link rel="stylesheet" href="search.css"/>
    <link rel="icon" type="image/png" href="Beatbuzz_icon.png">

</head>
<body class="page-enter">
  <div class="main-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <a href="explore.html"><i class="bi bi-compass"></i><span class="label">Explore</span></a>
      <a href="search.html" class="active"><i class="bi bi-search"></i><span class="label">Search</span></a>
      <a href="notification.html"><i class="bi bi-bell"></i><span class="label">Notifications</span></a>
      <a href="posts.html"><i class="bi bi-images"></i><span class="label">Posts</span></a>
      <a href="chat.html"><i class="bi bi-chat-dots"></i><span class="label">Chat</span></a>
      <a href="profile.html"><i class="bi bi-person"></i><span class="label">Profile</span></a>
      <a href="http://localhost:5000/logout"><i class="bi bi-box-arrow-right"></i><span class="label">Logout</span></a>
      
    </nav>

    <!-- Center feed -->
    <main class="center-feed">
      <h2 class="explore-title">Search Beatbuzz Users</h2>
      <div class="search-container">
        <input
          type="text"
          id="searchInput"
          placeholder="Search users..."
          autocomplete="off"
        />
      </div>
      <div class="profile-cards" id="results">
        <!-- JS will populate search results as profile cards -->
      </div>
    </main>

    <!-- Right profile panel -->
    <aside class="profile-panel">
      <img src="/uploads/default.jpg" 
           alt="Your Profile Picture" 
           class="your-pic" />
      <div class="your-name">Your Name</div>
      <div class="your-zodiac">♒ Aquarius</div>
      <div class="your-bio">About me: Enthusiast, writer. I make my vibe visible wherever I go.</div>
    </aside>
  </div>

  <script src="../theme.js"></script>
  <script src="search.js"></script>
</body>
</html>
