<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Beatbuzz | Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="explore.css"/>
  <link rel="stylesheet" href="chat.css"/>
  <link rel="icon" type="image/png" href="Beatbuzz_icon.png">
</head>
<body class="page-enter">
  <div class="main-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <a href="explore.html"><i class="bi bi-compass"></i><span class="label">Explore</span></a>
      <a href="search.html"><i class="bi bi-search"></i><span class="label">Search</span></a>
      <a href="notification.html"><i class="bi bi-bell"></i><span class="label">Notifications</span></a>
      <a href="posts.html"><i class="bi bi-images"></i><span class="label">Posts</span></a>
      <a href="chat.html" class="active"><i class="bi bi-chat-dots"></i><span class="label">Chat</span></a>
      <a href="profile.html"><i class="bi bi-person"></i><span class="label">Profile</span></a>
      <a href="http://localhost:5000/logout"><i class="bi bi-box-arrow-right"></i><span class="label">Logout</span></a>
    </nav>

    <!-- Center: Chat UI -->
    <main class="center-feed">
      <h2 class="explore-title">Chat</h2>
      <div class="chat-grid">
      <section class="conversations">
        <div class="conv-header">Conversations</div>
        <input id="conv-search" class="conv-search" type="text" placeholder="Search people or chats" />
        <div class="conv-scrollable">
          <div class="conv-list" id="conv-list"></div>
          <div class="conv-header" style="margin-top:10px">People</div>
          <div class="conv-list" id="contacts-list"></div>
        </div>
      </section>

      <section class="chat-panel">
        <div class="chat-header">
          <img id="peer-pic" class="peer-pic" src="/uploads/default.jpg" alt="Profile"/>
          <div class="peer-info">
            <div id="peer-username" class="peer-username">Select a conversation</div>
            <div id="peer-fullname" class="peer-fullname"></div>
          </div>
        </div>
        <div id="messages" class="messages">
          <div class="empty-state">Select a conversation or start a new one from People</div>
        </div>
        <form id="send-form" class="send-form">
          <input id="message-input" type="text" placeholder="Type a message" maxlength="1000"/>
          <button type="submit">Send</button>
        </form>
      </section>
      </div>
    </main>

    <aside class="profile-panel">
      <div class="me-card">
        <img id="me-pic" class="me-pic" src="/uploads/default.jpg" alt="Me"/>
        <div class="me-info">
          <div id="me-username" class="me-username">@loading</div>
          <div id="me-fullname" class="me-fullname">Loading...</div>
        </div>
      </div>
    </aside>
  </div>

  <script src="../theme.js"></script>
  <script src="chat.js"></script>
</body>
</html>
