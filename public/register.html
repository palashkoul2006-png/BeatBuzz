<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Bootstrap for consistent base styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="Beatbuzz_icon.png">

</head>
<body class="page-enter" data-theme="dark">
  <div class="card">
    <!-- LEFT: hero / illustration -->
    <div class="left">
      <div class="hero">
        <img class="logo hero-logo" src="Beatbuzz_logo.png" alt="Beatbuzz" />
        <h2 class="hero-heading">Create your account and join the vibe</h2>
      </div>
    </div>

    <!-- RIGHT: brand + form -->
    <div class="right">
      <div class="brand">
        <img src="Beatbuzz_icon.png" alt="Beatbuzz" class="brand-icon"/>
        <div class="brand-name">Beatbuzz</div>
      </div>
      <h1 class="title">Register</h1>
      <form id="registerForm" class="form" action="/register" method="POST">
        <label class="form-label" for="reg-username">Username</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <input class="input" id="reg-username" type="text" name="username" placeholder="Choose a username" required />
        </div>

        <label class="form-label" for="reg-email">Email address</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input class="input" id="reg-email" type="email" name="email" placeholder="Email (vit.edu)" required />
        </div>

        <label class="form-label" for="reg-password">Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input class="input" id="reg-password" type="password" name="password" placeholder="Create a password" required />
        </div>

        <div class="actions">
          <button id="createBtn" class="btn btn-primary" type="submit">Create account</button>
          <a class="btn btn-secondary" href="index.html">Login</a>
          <button type="button" id="openVerifyBtn" class="btn btn-link" style="margin-left:8px">Verify email with OTP</button>
        </div>
      </form>
      <p class="note">Use your institute email for access.</p>
    </div>
  </div>
  
  <!-- OTP Modal -->
  <div id="otpModal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <div class="brand mb-2 d-flex align-items-center">
        <img src="Beatbuzz_icon.png" alt="Beatbuzz" class="brand-icon" style="width:28px;height:28px;margin-right:8px;"/>
        <div class="brand-name">Beatbuzz</div>
      </div>
      <h2 class="title" style="margin:0 0 8px;color:var(--primary)">Verify Email</h2>
      <p class="subtitle" style="color:var(--muted)">Enter the OTP sent to your email. Valid for 5 minutes.</p>
      <div class="form">
        <div class="input-wrap">
          <i class="bi bi-shield-lock"></i>
          <input class="input" id="otpInput" type="text" placeholder="6-digit OTP" pattern="\\d{6}" maxlength="6" required />
        </div>
      </div>
      <div class="modal-actions">
        <button id="verifyOtpBtn" class="btn btn-primary">Verify</button>
        <button id="closeOtpBtn" class="btn btn-secondary">Cancel</button>
        <button id="resendOtpBtn" class="btn btn-link">Resend OTP</button>
      </div>
      <p id="otpStatus" class="note"></p>
    </div>
  </div>

  <script src="theme.js"></script>
  <script>
    (function(){
      const form = document.getElementById('registerForm');
      const createBtn = document.getElementById('createBtn');
      const otpModal = document.getElementById('otpModal');
      const otpInput = document.getElementById('otpInput');
      const verifyBtn = document.getElementById('verifyOtpBtn');
      const closeBtn = document.getElementById('closeOtpBtn');
      const statusEl = document.getElementById('otpStatus');
      const openVerifyBtn = document.getElementById('openVerifyBtn');
      const resendBtn = document.getElementById('resendOtpBtn');

      let cooldownTimer = null;
      function startCooldown(seconds){
        let s = seconds;
        resendBtn.disabled = true;
        resendBtn.textContent = `Resend in ${s}s`;
        if (cooldownTimer) clearInterval(cooldownTimer);
        cooldownTimer = setInterval(() => {
          s -= 1;
          if (s <= 0) { clearInterval(cooldownTimer); resendBtn.disabled = false; resendBtn.textContent = 'Resend OTP'; }
          else { resendBtn.textContent = `Resend in ${s}s`; }
        }, 1000);
      }

      let pendingIdentity = { username: '', email: '' };

      function openModal(){ otpModal.style.display = 'grid'; otpInput.focus(); }
      function closeModal(){ otpModal.style.display = 'none'; statusEl.textContent=''; otpInput.value=''; }

      openVerifyBtn.addEventListener('click', () => {
        // If user wants to open verify manually, use typed identity
        pendingIdentity.username = document.getElementById('reg-username').value.trim();
        pendingIdentity.email = document.getElementById('reg-email').value.trim();
        openModal();
      });
      closeBtn.addEventListener('click', closeModal);

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        createBtn.disabled = true;
        createBtn.textContent = 'Creating...';
        try {
          const resp = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
          });
          const data = await resp.json().catch(()=>null);
          if (!resp.ok || !data || !data.ok) {
            createBtn.disabled = false; createBtn.textContent = 'Create account';
            const msg = (data && data.message) ? data.message : 'Registration failed.';
            alert(msg);
            return;
          }
          pendingIdentity.username = data.username || username;
          pendingIdentity.email = data.email || email;
          openModal();
          statusEl.textContent = data.mail_error ? 'Email delivery failed; if you received OTP, enter it.' : 'OTP sent to your email.';
          startCooldown(60);
        } catch(err) {
          createBtn.disabled = false; createBtn.textContent = 'Create account';
          alert('Network error. Please try again.');
        }
      });

      verifyBtn.addEventListener('click', async function(){
        const otp = otpInput.value.trim();
        if (!otp || otp.length !== 6) { statusEl.textContent = 'Enter the 6-digit OTP.'; return; }
        verifyBtn.disabled = true; verifyBtn.textContent = 'Verifying...';
        try {
          const resp = await fetch('/api/verify_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: pendingIdentity.username, email: pendingIdentity.email, otp })
          });
          const data = await resp.json().catch(()=>null);
          if (resp.ok && data && data.ok) {
            statusEl.textContent = '✅ Email verified! Redirecting to setup...';
            setTimeout(() => { window.location.href = data.redirect || '/setup/setup.html'; }, 500);
          } else {
            statusEl.textContent = (data && data.message) ? data.message : '❌ Verification failed. Check OTP and try again.';
            verifyBtn.disabled = false; verifyBtn.textContent = 'Verify';
          }
        } catch(err) {
          statusEl.textContent = 'Network error. Please try again.';
          verifyBtn.disabled = false; verifyBtn.textContent = 'Verify';
        }
      });

      resendBtn.addEventListener('click', async function(){
        if (resendBtn.disabled) return;
        statusEl.textContent = 'Resending OTP...';
        try {
          const resp = await fetch('/api/resend_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: pendingIdentity.username, email: pendingIdentity.email })
          });
          const data = await resp.json().catch(()=>null);
          if (resp.ok && data && data.ok) {
            statusEl.textContent = '✅ OTP resent. Check your email.';
            startCooldown(data.cooldown || 60);
          } else {
            statusEl.textContent = (data && data.message) ? data.message : '❌ Could not resend OTP. Try again later.';
          }
        } catch(err) {
          statusEl.textContent = 'Network error. Please try again.';
        }
      });
    })();
  </script>
</body>
</html>
