<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="Beatbuzz_icon.png">
</head>
<body class="page-enter" data-theme="dark">
  <div class="auth-card">
    <div class="brand mb-3 d-flex align-items-center">
      <img src="Beatbuzz_icon.png" alt="Beatbuzz" class="brand-icon" style="width:32px;height:32px;margin-right:8px;"/>
      <div class="brand-name">Beatbuzz</div>
    </div>
    <h1 class="title">Reset your password</h1>
    <form id="resetForm">
      <label class="form-label" for="newpw">New password</label>
      <div class="input-wrap">
        <i class="bi bi-lock"></i>
        <input class="input" id="newpw" type="password" name="new_password" placeholder="Enter new password" required />
      </div>
      <label class="form-label mt-2" for="confirmpw">Confirm password</label>
      <div class="input-wrap">
        <i class="bi bi-lock"></i>
        <input class="input" id="confirmpw" type="password" placeholder="Confirm new password" required />
      </div>
      <div class="actions mt-3">
        <button class="btn btn-primary" type="submit">Update password</button>
        <a class="btn btn-secondary" href="index.html">Back to login</a>
      </div>
    </form>
    <p id="status" class="note"></p>
  </div>
  <script>
    function getToken() {
      // Support both /reset.html?token=... and /reset/<token>
      const params = new URLSearchParams(window.location.search);
      if (params.get('token')) return params.get('token');
      const parts = window.location.pathname.split('/');
      const idx = parts.indexOf('reset');
      if (idx >= 0 && parts[idx+1]) return parts[idx+1];
      return null;
    }
    document.getElementById('resetForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const token = getToken();
      const status = document.getElementById('status');
      const newpw = document.getElementById('newpw').value.trim();
      const confirmpw = document.getElementById('confirmpw').value.trim();
      if (!token) { status.textContent = 'Invalid reset link.'; return; }
      if (newpw.length < 6) { status.textContent = 'Password should be at least 6 characters.'; return; }
      if (newpw !== confirmpw) { status.textContent = 'Passwords do not match.'; return; }
      status.textContent = 'Updating password...';
      try {
        const resp = await fetch('/api/reset_password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newpw })
        });
        const txt = await resp.text();
        if (resp.ok) {
          status.textContent = 'Password updated. Redirecting to login...';
          setTimeout(() => { window.location.href = '/index.html'; }, 1500);
        } else {
          status.textContent = txt || 'Failed to update password.';
        }
      } catch (err) {
        status.textContent = 'Network error. Please try again.';
      }
    });
  </script>
  <script src="theme.js"></script>
</body>
</html>
